services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: readora-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: readora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: readora-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: